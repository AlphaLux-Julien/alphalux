<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Confirmez votre email — AlphaLux</title>
  <style>
    @media only screen and (max-width: 600px) {
      .email-wrapper { padding: 24px 16px !important; }
      .email-card { padding: 40px 28px !important; }
      .logo-text { font-size: 22px !important; letter-spacing: 0.2em !important; }
      .headline { font-size: 28px !important; }
      .btn-confirm { padding: 14px 32px !important; font-size: 10px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:Georgia,'Times New Roman',serif;">

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0"
    style="background-color:#0a0a0a;min-height:100vh;">
    <tr>
      <td align="center" class="email-wrapper" style="padding:48px 24px;">

        <!-- Card -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0"
          style="max-width:540px;background-color:#0d0d0d;border:1px solid #2a2a2a;">

          <!-- Top accent line -->
          <tr>
            <td style="height:2px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <!-- Card body -->
          <tr>
            <td class="email-card" style="padding:56px 56px 48px 56px;">

              <!-- Logo -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:48px;">
                    <span class="logo-text"
                      style="font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;color:#e8e0cc;text-decoration:none;">
                      ALPHA<span style="color:#c9a84c;">LUX</span>
                    </span>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:40px;">
                    <table cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="width:32px;height:1px;background:#2a2a2a;font-size:0;line-height:0;">&nbsp;</td>
                        <td style="width:8px;height:4px;background:#c9a84c;font-size:0;line-height:0;">&nbsp;</td>
                        <td style="width:32px;height:1px;background:#2a2a2a;font-size:0;line-height:0;">&nbsp;</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- Eyebrow -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:16px;">
                    <span style="font-family:Arial,Helvetica,sans-serif;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:#666;">
                      Bienvenue
                    </span>
                  </td>
                </tr>
              </table>

              <!-- Headline -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:28px;">
                    <span class="headline"
                      style="font-family:Georgia,'Times New Roman',serif;font-size:34px;font-weight:300;color:#e8e0cc !important;letter-spacing:0.04em;line-height:1.2;display:block;">
                      Bienvenue sur AlphaLux
                    </span>
                  </td>
                </tr>
              </table>

              <!-- Body text -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:40px;">
                    <span style="font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#999;letter-spacing:0.04em;line-height:1.8;display:block;max-width:400px;text-align:center;">
                      Confirmez votre adresse email pour accéder à votre tableau de bord patrimonial.
                    </span>
                  </td>
                </tr>
              </table>

              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:40px;">
                    <table cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center"
                          style="border:1px solid #c9a84c;background-color:transparent;">
                          <a href="{{ .ConfirmationURL }}" class="btn-confirm"
                            style="display:inline-block;padding:16px 48px;font-family:Arial,Helvetica,sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:#c9a84c;text-decoration:none;white-space:nowrap;">
                            Confirmer mon email
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- Fallback link -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:8px;">
                    <span style="font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#444;letter-spacing:0.05em;">
                      Si le bouton ne fonctionne pas, copiez ce lien :
                    </span>
                  </td>
                </tr>
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}"
                      style="font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#8a7340;letter-spacing:0.03em;word-break:break-all;text-decoration:underline;">
                      {{ .ConfirmationURL }}
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Bottom accent line -->
          <tr>
            <td style="height:1px;background:#1e1e1e;font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:24px 40px;">
              <span style="font-family:Arial,Helvetica,sans-serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#333;">
                © 2026 AlphaLux &nbsp;·&nbsp; Patrimoine &nbsp;·&nbsp; Clarté &nbsp;·&nbsp; Performance
              </span>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
